name: CI

on:
  push:
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version auto-detected from "packageManager" in package.json (pnpm@10.33.0).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  lint:
    name: Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bomy_test
          POSTGRES_USER: bomy
          POSTGRES_PASSWORD: ci_password
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      # Unauthenticated Redis mirrors GitHub's official runner-mode Redis
      # service example. Safe here because the service is ephemeral,
      # job-scoped, and mapped only to the GitHub-hosted runner for this
      # test job.
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://bomy:ci_password@localhost:5432/bomy_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create bomy_app role
        run: |
          psql "$DATABASE_URL" -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'bomy_app') THEN CREATE ROLE bomy_app LOGIN PASSWORD 'ci_password' NOSUPERUSER NOINHERIT NOCREATEROLE NOCREATEDB NOBYPASSRLS; END IF; END \$\$;"
          psql "$DATABASE_URL" -c "GRANT CONNECT ON DATABASE bomy_test TO bomy_app;"

      - name: Apply schema + RLS policies
        run: pnpm --filter @bomy/db migrate

      - name: Grant bomy_app table access
        run: |
          psql "$DATABASE_URL" -c "GRANT USAGE ON SCHEMA public TO bomy_app;"
          psql "$DATABASE_URL" -c "GRANT USAGE ON SCHEMA app TO bomy_app;"
          psql "$DATABASE_URL" -c "GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO bomy_app;"
          psql "$DATABASE_URL" -c "GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO bomy_app;"
          psql "$DATABASE_URL" -c "GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA app TO bomy_app;"
          psql "$DATABASE_URL" -c "GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA public TO bomy_app;"

      - name: Run tests
        run: pnpm test
        env:
          BOMY_RLS_READY: "1"
          DATABASE_APP_URL: postgresql://bomy_app:ci_password@localhost:5432/bomy_test
          REDIS_URL: redis://localhost:6379
